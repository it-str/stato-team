<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stato Team</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f5f5f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 0.25rem;
    color: #1a1a1a;
  }

  .subtitle {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    max-width: 720px;
    margin: 0 auto 2rem;
  }

  .card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 14px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 16px;
  }

  .person-name {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
  }

  .badge {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .badge-ufficio { background: #EAF3DE; color: #3B6D11; }
  .dot-ufficio   { background: #639922; }
  .badge-casa    { background: #E6F1FB; color: #185FA5; }
  .dot-casa      { background: #378ADD; }
  .badge-ferie   { background: #FAEEDA; color: #854F0B; }
  .dot-ferie     { background: #BA7517; }

  .divider {
    width: 100%;
    border: none;
    border-top: 0.5px solid rgba(0,0,0,0.08);
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    align-self: flex-start;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }

  .btn-state {
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: transparent;
    color: #555;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.12s;
    font-family: inherit;
  }

  .btn-state:hover { background: #f5f5f4; }

  .btn-state.active-ufficio { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; font-weight: 500; }
  .btn-state.active-casa    { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; font-weight: 500; }
  .btn-state.active-ferie   { background: #FAEEDA; color: #854F0B; border-color: #FAC775; font-weight: 500; }

  .btn-icon { font-size: 15px; }

  .last-update {
    font-size: 11px;
    color: #bbb;
    text-align: center;
  }

  .status-bar {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    color: #bbb;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #C0DD97;
    display: inline-block;
  }

  .status-dot.error { background: #F09595; }
  .status-dot.loading { background: #FAC775; }

  .error-msg {
    max-width: 720px;
    margin: 1rem auto 0;
    background: #FCEBEB;
    color: #A32D2D;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    text-align: center;
    display: none;
  }

  .config-panel {
    max-width: 720px;
    margin: 2rem auto 0;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 14px;
    overflow: hidden;
  }

  .config-toggle {
    width: 100%;
    padding: 0.75rem 1.25rem;
    background: transparent;
    border: none;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    font-size: 13px;
    color: #888;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .config-body {
    padding: 1.25rem;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .config-body.open { display: flex; }

  .config-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .config-row label {
    font-size: 12px;
    color: #888;
    font-weight: 500;
  }

  .config-row input {
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 8px;
    font-family: monospace;
    background: #fafafa;
    color: #1a1a1a;
    width: 100%;
  }

  .btn-save {
    padding: 8px 20px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: #1a1a1a;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    align-self: flex-start;
    margin-top: 4px;
  }

  .btn-save:hover { background: #333; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #eee; }
    h1 { color: #eee; }
    .card { background: #2a2a2a; border-color: rgba(255,255,255,0.1); }
    .person-name { color: #eee; }
    .btn-state { border-color: rgba(255,255,255,0.15); color: #aaa; }
    .btn-state:hover { background: #333; }
    .config-panel { background: #2a2a2a; border-color: rgba(255,255,255,0.1); }
    .config-toggle { color: #888; border-color: rgba(255,255,255,0.08); }
    .config-row input { background: #333; border-color: rgba(255,255,255,0.12); color: #eee; }
    .divider { border-color: rgba(255,255,255,0.08); }
    .badge-ufficio { background: #1a2e10; color: #9FE1CB; }
    .badge-casa    { background: #0d1f35; color: #85B7EB; }
    .badge-ferie   { background: #2e1f05; color: #FAC775; }
    .btn-state.active-ufficio { background: #1a2e10; color: #9FE1CB; border-color: #27500A; }
    .btn-state.active-casa    { background: #0d1f35; color: #85B7EB; border-color: #0C447C; }
    .btn-state.active-ferie   { background: #2e1f05; color: #FAC775; border-color: #633806; }
    .error-msg { background: #2e0d0d; color: #F09595; }
  }
</style>
</head>
<body>

<h1>Stato Team</h1>
<p class="subtitle" id="last-refresh">Aggiornamento in corso...</p>
<div style="text-align:center;margin-bottom:1.5rem;">
  <button onclick="fetchStates()" style="font-size:12px;padding:5px 16px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.15);background:transparent;color:#888;cursor:pointer;font-family:inherit;">↻ Aggiorna ora</button>
</div>

<div class="grid" id="cards"></div>

<div class="status-bar">
  <span class="status-dot" id="status-dot"></span>
  <span id="status-text">Connessione...</span>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="config-panel">
  <button class="config-toggle" onclick="toggleConfig()">
    <span>⚙</span> Configurazione
  </button>
  <div class="config-body" id="config-body">
    <div class="config-row">
      <label>Gist ID</label>
      <input type="text" id="cfg-gist-id" placeholder="es. a1b2c3d4e5f6..." />
    </div>
    <div class="config-row">
      <label>GitHub Token (necessario solo per aggiornare)</label>
      <input type="password" id="cfg-token" placeholder="ghp_..." />
    </div>
    <button class="btn-save" onclick="saveConfig()">Salva e ricarica</button>
    <p style="font-size:11px;color:#aaa;">I dati vengono salvati nel browser locale. Il token non lascia mai questo dispositivo.</p>
  </div>
</div>

<script>
const PEOPLE = [
  { id: 'gianmarco', name: 'Gianmarco', initials: 'GM', avatarBg: '#EEEDFE', avatarColor: '#3C3489' },
  { id: 'luca',      name: 'Luca',      initials: 'LB', avatarBg: '#E1F5EE', avatarColor: '#085041' },
  { id: 'roberto',   name: 'Roberto',   initials: 'RB', avatarBg: '#FAECE7', avatarColor: '#712B13' },
  { id: 'maria',     name: 'Maria',     initials: 'MN', avatarBg: '#FDE8F5', avatarColor: '#7A1255' }
];

const STATES = [
  { key: 'ufficio', label: 'In ufficio', icon: '🏢' },
  { key: 'casa',    label: 'Da casa',    icon: '🏠' },
  { key: 'ferie',   label: 'Ferie',      icon: '🌴' }
];

const FILENAME = 'stati.json';
const POLL_INTERVAL = 60000;

function getCfg() {
  return {
    gistId: localStorage.getItem('st_gist_id') || '',
    token:  localStorage.getItem('st_token')   || ''
  };
}

function toggleConfig() {
  const body = document.getElementById('config-body');
  body.classList.toggle('open');
  if (body.classList.contains('open')) {
    const cfg = getCfg();
    document.getElementById('cfg-gist-id').value = cfg.gistId;
    document.getElementById('cfg-token').value   = cfg.token;
  }
}

function saveConfig() {
  localStorage.setItem('st_gist_id', document.getElementById('cfg-gist-id').value.trim());
  localStorage.setItem('st_token',   document.getElementById('cfg-token').value.trim());
  document.getElementById('config-body').classList.remove('open');
  fetchStates();
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state === 'ok' ? '' : state === 'error' ? ' error' : ' loading');
  document.getElementById('status-text').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

let currentData = {};

const RAW_URL = 'https://gist.githubusercontent.com/it-str/4aa600e84bf6536b3643700944733d75/raw/stati.json';

async function fetchStates() {
  setStatus('loading', 'Aggiornamento...');
  try {
    const res = await fetch(RAW_URL + '?nocache=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    currentData = await res.json();
    hideError();
    const now = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-refresh').textContent = `Aggiornato alle ${now}`;
    setStatus('ok', 'Connesso');
    renderCards(currentData);
  } catch (e) {
    setStatus('error', 'Errore di connessione');
    showError('Impossibile leggere il Gist: ' + e.message);
  }
}

async function updateState(personId, newState) {
  const { gistId, token } = getCfg();
  if (!token) {
    showError('Token GitHub mancante. Inseriscilo nella Configurazione per poter aggiornare.');
    return;
  }
  const now = new Date().toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  currentData[personId] = { status: newState, updated: now };
  renderCards(currentData);

  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify({
        files: { [FILENAME]: { content: JSON.stringify(currentData, null, 2) } }
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    hideError();
    setStatus('ok', 'Salvato');
  } catch (e) {
    setStatus('error', 'Errore salvataggio');
    showError('Impossibile salvare: ' + e.message);
  }
}

function renderCards(data) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  PEOPLE.forEach(p => {
    const entry = data[p.id] || { status: 'ufficio', updated: null };
    const stateInfo = STATES.find(s => s.key === entry.status) || STATES[0];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="avatar" style="background:${p.avatarBg};color:${p.avatarColor}">${p.initials}</div>
      <div class="person-name">${p.name}</div>
      <div class="badge badge-${entry.status}">
        <span class="dot dot-${entry.status}"></span>${stateInfo.label}
      </div>
      <hr class="divider">
      <div class="section-label">Aggiorna</div>
      <div class="btn-group">
        ${STATES.map(s => `
          <button class="btn-state ${entry.status === s.key ? 'active-' + s.key : ''}"
                  onclick="updateState('${p.id}','${s.key}')">
            <span class="btn-icon">${s.icon}</span>${s.label}
          </button>
        `).join('')}
      </div>
      ${entry.updated ? `<div class="last-update">agg. ${entry.updated}</div>` : ''}
    `;
    container.appendChild(card);
  });
}

fetchStates();
setInterval(fetchStates, POLL_INTERVAL);
</script>
</body>
</html>
